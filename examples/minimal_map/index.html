<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Ferrisium Minimal Map</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: ui-sans-serif, system-ui, sans-serif;
        background: #0c1018;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        overscroll-behavior: none;
      }

      #bevy {
        display: block;
        width: 100vw;
        height: 100vh;
        background: #0c1018;
        outline: none;
        touch-action: none;
      }

      .attribution {
        position: fixed;
        right: 10px;
        bottom: 8px;
        color: #d9e2ee;
        background: rgba(8, 12, 18, 0.72);
        border: 1px solid rgba(217, 226, 238, 0.14);
        border-radius: 6px;
        padding: 4px 7px;
        font-size: 12px;
        line-height: 1.35;
      }
    </style>
  </head>
  <body>
    <canvas id="bevy" tabindex="0" aria-label="Ferrisium minimal map"></canvas>
    <div class="attribution">NASA GIBS / ESDIS</div>
    <script>
      const ferrisiumCanvas = document.getElementById("bevy");
      ferrisiumCanvas.focus();
      ferrisiumCanvas.addEventListener("pointerdown", () => {
        ferrisiumCanvas.focus();
      });
    </script>
    <link data-trunk rel="rust" data-bin="minimal_map" />
  </body>
</html>

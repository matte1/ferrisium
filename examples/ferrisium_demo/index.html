<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <link
      data-trunk
      rel="copy-file"
      href="../../assets/ferrisium/skyboxes/milkyway_512.png"
      data-target-path="assets/ferrisium/skyboxes"
    />
    <link
      data-trunk
      rel="copy-file"
      href="../../assets/ferrisium/skyboxes/milkyway_1024.png"
      data-target-path="assets/ferrisium/skyboxes"
    />
    <link
      data-trunk
      rel="copy-file"
      href="../../assets/ferrisium/skyboxes/milkyway_2048.png"
      data-target-path="assets/ferrisium/skyboxes"
    />
    <title>Ferrisium Demo</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: ui-sans-serif, system-ui, sans-serif;
        background: #04070d;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #04070d;
      }

      [hidden] {
        display: none !important;
      }

      #bevy {
        display: block;
        width: 100vw;
        height: 100vh;
        background: #04070d;
        outline: none;
        touch-action: none;
        overscroll-behavior: none;
      }

      .hud {
        position: fixed;
        left: 16px;
        top: 16px;
        box-sizing: border-box;
        width: min(320px, calc(100vw - 32px));
        padding: 10px 12px;
        color: #d9e2ee;
        background: rgba(4, 7, 13, 0.8);
        border: 1px solid rgba(217, 226, 238, 0.1);
        border-radius: 10px;
        font-size: 13px;
        line-height: 1.4;
        backdrop-filter: blur(8px);
      }

      .hud label {
        display: grid;
        gap: 5px;
        margin-top: 8px;
        color: #aeb9c8;
        font-size: 12px;
      }

      .hud select,
      .hud input[type="range"] {
        box-sizing: border-box;
        width: 100%;
        min-height: 30px;
        border: 1px solid rgba(217, 226, 238, 0.18);
        border-radius: 6px;
        padding: 4px 7px;
        color: #eef4fb;
        background: rgba(11, 17, 28, 0.96);
        font: inherit;
      }

      .hud input[type="range"] {
        padding: 0;
        accent-color: #6fb5ff;
      }

      .view-controls {
        display: grid;
        gap: 7px;
        margin-top: 8px;
      }

      .solar-control-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        color: #aeb9c8;
        font-size: 12px;
      }

      .solar-control-row label {
        display: block;
        margin: 0;
      }

      .solar-button-row {
        display: flex;
        flex: 0 0 auto;
        gap: 6px;
      }

      .solar-button-row button {
        min-width: 58px;
      }

      .hud button {
        box-sizing: border-box;
        min-height: 30px;
        border: 1px solid rgba(217, 226, 238, 0.2);
        border-radius: 6px;
        padding: 4px 9px;
        color: #d9e2ee;
        background: rgba(11, 17, 28, 0.96);
        font: inherit;
        cursor: pointer;
      }

      .time-readout,
      .metric-note {
        margin-top: 8px;
        color: #aeb9c8;
        font-size: 12px;
      }

      .source-panel {
        position: fixed;
        right: 16px;
        top: 16px;
        width: min(320px, calc(100vw - 32px));
        padding: 12px;
        color: #d9e2ee;
        background: rgba(4, 7, 13, 0.84);
        border: 1px solid rgba(217, 226, 238, 0.12);
        border-radius: 8px;
        backdrop-filter: blur(8px);
      }

      .source-panel form {
        display: grid;
        gap: 10px;
      }

      .source-panel label {
        display: grid;
        gap: 5px;
        font-size: 12px;
        color: #aeb9c8;
      }

      .source-panel input,
      .source-panel select {
        min-height: 34px;
        box-sizing: border-box;
        width: 100%;
        border: 1px solid rgba(217, 226, 238, 0.18);
        border-radius: 6px;
        padding: 6px 8px;
        color: #eef4fb;
        background: rgba(11, 17, 28, 0.96);
        font: inherit;
      }

      .source-panel button {
        min-height: 34px;
        border: 1px solid rgba(217, 226, 238, 0.2);
        border-radius: 6px;
        color: #071019;
        background: #d9e2ee;
        font: inherit;
        font-weight: 650;
        cursor: pointer;
      }

      @media (max-width: 720px) {
        .source-panel {
          left: 16px;
          right: 16px;
          top: auto;
          bottom: 16px;
          width: auto;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="bevy" tabindex="0" aria-label="Ferrisium demo scene"></canvas>
    <script>
      const ferrisiumCanvas = document.getElementById("bevy");
      ferrisiumCanvas.focus();
      ferrisiumCanvas.addEventListener("pointerdown", () => {
        ferrisiumCanvas.focus();
      });
    </script>
    <div class="hud">
      Ferrisium demo<br />
      Globe by default; use Scene or URL views
      <label>
        Scene
        <select id="view-mode">
          <option value="globe">Globe</option>
          <option value="solar">Solar System</option>
          <option value="map">Map</option>
        </select>
      </label>
      <div id="time-readout" class="time-readout"></div>
      <div id="globe-controls" class="view-controls">
        <label>
          Body
          <select id="globe-focus">
            <option value="earth">Earth</option>
            <option value="mercury">Mercury</option>
            <option value="venus">Venus</option>
            <option value="moon">Moon</option>
            <option value="mars">Mars</option>
            <option value="ceres">Ceres</option>
            <option value="io">Io</option>
            <option value="europa">Europa</option>
            <option value="ganymede">Ganymede</option>
            <option value="callisto">Callisto</option>
            <option value="titan">Titan</option>
            <option value="dione">Dione</option>
            <option value="enceladus">Enceladus</option>
            <option value="iapetus">Iapetus</option>
            <option value="mimas">Mimas</option>
            <option value="rhea">Rhea</option>
            <option value="tethys">Tethys</option>
          </select>
        </label>
      </div>
      <div id="map-controls" class="view-controls">
        <label>
          Body
          <select id="map-body">
            <option value="earth">Earth</option>
            <option value="mercury">Mercury</option>
            <option value="venus">Venus</option>
            <option value="moon">Moon</option>
            <option value="mars">Mars</option>
            <option value="ceres">Ceres</option>
            <option value="io">Io</option>
            <option value="europa">Europa</option>
            <option value="ganymede">Ganymede</option>
            <option value="callisto">Callisto</option>
            <option value="titan">Titan</option>
            <option value="dione">Dione</option>
            <option value="enceladus">Enceladus</option>
            <option value="iapetus">Iapetus</option>
            <option value="mimas">Mimas</option>
            <option value="rhea">Rhea</option>
            <option value="tethys">Tethys</option>
          </select>
        </label>
      </div>
      <div id="solar-controls" class="view-controls">
        <label>
          Focus
          <select id="solar-focus">
            <option value="scene">Scene center</option>
            <option value="sun">Sun</option>
            <option value="mercury">Mercury</option>
            <option value="venus">Venus</option>
            <option value="earth">Earth</option>
            <option value="moon">Moon</option>
            <option value="mars">Mars</option>
          </select>
        </label>
        <div class="solar-control-row">
          <label for="solar-time-offset">
            Time <span id="solar-time-value">J2000</span>
          </label>
          <div class="solar-button-row">
            <button id="solar-time-toggle" type="button" title="Play or pause solar time">Play</button>
            <button id="solar-time-reset" type="button" title="Reset solar time to J2000">J2000</button>
          </div>
        </div>
        <input
          id="solar-time-offset"
          type="range"
          min="-3650"
          max="3650"
          step="0.25"
          value="0"
          title="Epoch offset from J2000 in days"
        />
        <label>
          Speed
          <select id="solar-time-speed">
            <option value="0.041666666666666664">1 hour / second</option>
            <option value="0.25">6 hours / second</option>
            <option value="1">1 day / second</option>
            <option value="7">1 week / second</option>
            <option value="30">30 days / second</option>
          </select>
        </label>
        <div class="solar-control-row">
          <label for="solar-trail-months">
            Trail <span id="solar-trail-months-value">12 months</span>
          </label>
          <button id="solar-camera-reset" type="button" title="Reset solar camera">Reset</button>
        </div>
        <input
          id="solar-trail-months"
          type="range"
          min="1"
          max="36"
          step="1"
          value="12"
          title="Trajectory history window"
        />
      </div>
      <div id="solar-metric-note" class="metric-note">
        Solar: positions, paths, and body radii are metric; overview locators do not rescale bodies.
      </div>
    </div>
    <aside id="source-panel" class="source-panel" aria-label="Earth tile source">
      <form id="source-form">
        <label>
          Mapbox token
          <input
            id="mapbox-token"
            autocomplete="off"
            inputmode="text"
            pattern="pk\..+"
            placeholder="pk..."
            spellcheck="false"
          />
        </label>
        <label>
          Earth tiles
          <select id="earth-tile-source">
            <option value="auto">Auto</option>
            <option value="nasa-blue-marble">NASA Blue Marble</option>
            <option value="openstreetmap">OpenStreetMap</option>
            <option value="mapbox-satellite">Mapbox Satellite</option>
            <option value="mapbox-satellite-streets">Mapbox Satellite Streets</option>
            <option value="mapbox-streets">Mapbox Streets</option>
            <option value="mapbox-outdoors">Mapbox Outdoors</option>
            <option value="mapbox-light">Mapbox Light</option>
            <option value="mapbox-dark">Mapbox Dark</option>
          </select>
        </label>
        <button type="submit">Apply</button>
      </form>
    </aside>
    <script>
      const mapboxTokenKey = "ferrisium.mapbox_token";
      const earthTileSourceKey = "ferrisium.earth_tile_source";
      const globeFocusKey = "ferrisium.globe_focus";
      const mapBodyKey = "ferrisium.map_body";
      const solarTrailMonthsKey = "ferrisium.solar_trail_months";
      const solarCameraResetKey = "ferrisium.solar_camera_reset";
      const solarFocusKey = "ferrisium.solar_focus";
      const solarTimeOffsetDaysKey = "ferrisium.solar_time_offset_days";
      const solarTimeRunningKey = "ferrisium.solar_time_running";
      const solarTimeSpeedKey = "ferrisium.solar_time_speed_days_per_second";
      const sourceForm = document.getElementById("source-form");
      const sourcePanel = document.getElementById("source-panel");
      const tokenInput = document.getElementById("mapbox-token");
      const sourceSelect = document.getElementById("earth-tile-source");
      const viewSelect = document.getElementById("view-mode");
      const timeReadout = document.getElementById("time-readout");
      const globeControls = document.getElementById("globe-controls");
      const globeFocus = document.getElementById("globe-focus");
      const mapControls = document.getElementById("map-controls");
      const mapBody = document.getElementById("map-body");
      const solarControls = document.getElementById("solar-controls");
      const solarMetricNote = document.getElementById("solar-metric-note");
      const solarTrailMonths = document.getElementById("solar-trail-months");
      const solarTrailMonthsValue = document.getElementById("solar-trail-months-value");
      const solarCameraReset = document.getElementById("solar-camera-reset");
      const solarFocus = document.getElementById("solar-focus");
      const solarTimeOffset = document.getElementById("solar-time-offset");
      const solarTimeReset = document.getElementById("solar-time-reset");
      const solarTimeSpeed = document.getElementById("solar-time-speed");
      const solarTimeToggle = document.getElementById("solar-time-toggle");
      const solarTimeValue = document.getElementById("solar-time-value");
      const sourceValues = new Set(
        Array.from(sourceSelect.options).map((option) => option.value),
      );
      const viewValues = new Set(
        Array.from(viewSelect.options).map((option) => option.value),
      );
      const globeFocusValues = new Set(
        Array.from(globeFocus.options).map((option) => option.value),
      );
      const mapBodyValues = new Set(Array.from(mapBody.options).map((option) => option.value));
      const solarFocusValues = new Set(
        Array.from(solarFocus.options).map((option) => option.value),
      );
      const solarTimeSpeedValues = new Set(
        Array.from(solarTimeSpeed.options).map((option) => option.value),
      );
      const searchParams = new URLSearchParams(window.location.search);
      const solarEpochOriginMs = Date.UTC(2000, 0, 1, 12, 0, 0);
      let solarTimeOffsetDays = 0;
      let solarTimeRunning = false;
      let solarTimeLastTickMs = window.performance.now();
      function storageGet(key) {
        try {
          return window.localStorage?.getItem(key) ?? null;
        } catch {
          return null;
        }
      }

      function storageSet(key, value) {
        try {
          window.localStorage?.setItem(key, value);
        } catch {
          // Storage may be blocked in private or security-constrained contexts.
        }
      }

      function storageRemove(key) {
        try {
          window.localStorage?.removeItem(key);
        } catch {
          // Storage may be blocked in private or security-constrained contexts.
        }
      }

      const initialView = searchParams.get("view") ?? searchParams.get("mode") ?? "globe";
      const initialToken =
        searchParams.get("mapbox_token") ??
        storageGet(mapboxTokenKey) ??
        "";
      const initialSource =
        searchParams.get("tile_source") ??
        searchParams.get("earth_tiles") ??
        storageGet(earthTileSourceKey) ??
        "auto";
      const initialGlobeFocus =
        searchParams.get("focus") ?? storageGet(globeFocusKey) ?? "earth";
      const initialMapBody =
        searchParams.get("map_body") ?? storageGet(mapBodyKey) ?? "earth";
      const initialTrailMonths =
        searchParams.get("trail_months") ??
        storageGet(solarTrailMonthsKey) ??
        "12";
      const initialSolarFocus =
        searchParams.get("solar_focus") ??
        searchParams.get("focus") ??
        storageGet(solarFocusKey) ??
        "scene";
      const initialSolarTimeOffsetDays =
        searchParams.get("solar_days") ??
        searchParams.get("solar_epoch_days") ??
        storageGet(solarTimeOffsetDaysKey) ??
        "0";
      const initialSolarTimeSpeed =
        searchParams.get("solar_speed") ??
        storageGet(solarTimeSpeedKey) ??
        "7";
      const initialSolarTimeRunning =
        searchParams.get("solar_running") ??
        storageGet(solarTimeRunningKey) ??
        "false";

      function normalizedView(value) {
        const normalized = value.trim().toLowerCase();
        if (normalized === "3d") return "globe";
        if (normalized === "2d") return "map";
        if (normalized === "solar-system" || normalized === "orrery") return "solar";
        return normalized;
      }

      function clampNumber(value, min, max, fallback) {
        const parsed = Number.parseFloat(value);
        if (!Number.isFinite(parsed)) return fallback;
        return Math.min(max, Math.max(min, parsed));
      }

      function truthy(value) {
        return ["1", "true", "yes", "on"].includes(String(value).trim().toLowerCase());
      }

      const selectedView = normalizedView(initialView);
      viewSelect.value = viewValues.has(selectedView) ? selectedView : "globe";
      globeControls.hidden = viewSelect.value !== "globe";
      mapControls.hidden = viewSelect.value !== "map";
      solarControls.hidden = viewSelect.value !== "solar";
      solarMetricNote.hidden = viewSelect.value !== "solar";
      tokenInput.value = initialToken;
      sourceSelect.value = sourceValues.has(initialSource) ? initialSource : "auto";
      globeFocus.value = globeFocusValues.has(initialGlobeFocus.toLowerCase())
        ? initialGlobeFocus.toLowerCase()
        : "earth";
      storageSet(globeFocusKey, globeFocus.value);
      mapBody.value = mapBodyValues.has(initialMapBody.toLowerCase())
        ? initialMapBody.toLowerCase()
        : "earth";
      storageSet(mapBodyKey, mapBody.value);
      sourcePanel.hidden = viewSelect.value === "solar" || (
        viewSelect.value === "map" && mapBody.value !== "earth"
      );
      solarTrailMonths.value = String(
        Math.min(36, Math.max(1, Number.parseInt(initialTrailMonths, 10) || 12)),
      );
      solarTrailMonthsValue.textContent = `${solarTrailMonths.value} months`;
      storageSet(solarTrailMonthsKey, solarTrailMonths.value);
      solarFocus.value = solarFocusValues.has(initialSolarFocus.toLowerCase())
        ? initialSolarFocus.toLowerCase()
        : "scene";
      storageSet(solarFocusKey, solarFocus.value);
      solarTimeOffsetDays = clampNumber(
        initialSolarTimeOffsetDays,
        Number(solarTimeOffset.min),
        Number(solarTimeOffset.max),
        0,
      );
      solarTimeRunning = truthy(initialSolarTimeRunning);
      solarTimeOffset.value = solarTimeOffsetDays.toFixed(2);
      solarTimeSpeed.value = solarTimeSpeedValues.has(initialSolarTimeSpeed)
        ? initialSolarTimeSpeed
        : "7";
      storageSet(solarTimeOffsetDaysKey, String(solarTimeOffsetDays));
      storageSet(solarTimeRunningKey, String(solarTimeRunning));
      storageSet(solarTimeSpeedKey, solarTimeSpeed.value);

      viewSelect.addEventListener("change", () => {
        const nextUrl = new URL(window.location.href);
        nextUrl.searchParams.delete("mode");
        if (viewSelect.value === "globe") {
          nextUrl.searchParams.delete("view");
          nextUrl.searchParams.delete("solar_focus");
        } else {
          nextUrl.searchParams.set("view", viewSelect.value);
        }
        if (viewSelect.value === "solar") {
          nextUrl.searchParams.delete("focus");
          nextUrl.searchParams.set("solar_focus", solarFocus.value);
        }
        window.location.assign(nextUrl.toString());
      });

      function solarTimeDateLabel() {
        const date = new Date(solarEpochOriginMs + solarTimeOffsetDays * 86_400_000);
        const isoDate = date.toISOString().slice(0, 10);
        if (Math.abs(solarTimeOffsetDays) < 0.005) {
          return `${isoDate} J2000`;
        }
        const signedDays =
          solarTimeOffsetDays > 0
            ? `+${solarTimeOffsetDays.toFixed(1)}`
            : solarTimeOffsetDays.toFixed(1);
        return `${isoDate} (${signedDays} d)`;
      }

      function syncSolarTimeReadout() {
        solarTimeValue.textContent = solarTimeDateLabel();
        solarTimeToggle.textContent = solarTimeRunning ? "Pause" : "Play";
      }

      function updateTimeReadout() {
        if (viewSelect.value === "solar") {
          syncSolarTimeReadout();
          timeReadout.textContent = `Epoch: ${solarTimeDateLabel()}`;
        } else {
          timeReadout.textContent = `Current time: ${new Date().toISOString()}`;
        }
      }

      updateTimeReadout();
      window.setInterval(() => {
        const nowMs = window.performance.now();
        const deltaSeconds = (nowMs - solarTimeLastTickMs) / 1000;
        solarTimeLastTickMs = nowMs;

        if (viewSelect.value === "solar" && solarTimeRunning) {
          const speedDaysPerSecond = Number.parseFloat(solarTimeSpeed.value);
          if (Number.isFinite(speedDaysPerSecond)) {
            solarTimeOffsetDays = clampNumber(
              solarTimeOffsetDays + speedDaysPerSecond * deltaSeconds,
              Number(solarTimeOffset.min),
              Number(solarTimeOffset.max),
              solarTimeOffsetDays,
            );
            solarTimeOffset.value = solarTimeOffsetDays.toFixed(2);
            storageSet(solarTimeOffsetDaysKey, String(solarTimeOffsetDays));
          }
        }

        updateTimeReadout();
      }, 250);

      globeFocus.addEventListener("change", () => {
        storageSet(globeFocusKey, globeFocus.value);
        const nextUrl = new URL(window.location.href);
        nextUrl.searchParams.set("focus", globeFocus.value);
        if (viewSelect.value === "globe") {
          nextUrl.searchParams.delete("view");
        }
        window.history.replaceState(null, "", nextUrl.toString());
      });

      mapBody.addEventListener("change", () => {
        storageSet(mapBodyKey, mapBody.value);
        const nextUrl = new URL(window.location.href);
        nextUrl.searchParams.set("view", "map");
        nextUrl.searchParams.set("map_body", mapBody.value);
        window.location.assign(nextUrl.toString());
      });

      solarTimeOffset.addEventListener("input", () => {
        solarTimeOffsetDays = clampNumber(
          solarTimeOffset.value,
          Number(solarTimeOffset.min),
          Number(solarTimeOffset.max),
          solarTimeOffsetDays,
        );
        storageSet(solarTimeOffsetDaysKey, String(solarTimeOffsetDays));
        updateTimeReadout();
      });

      solarTimeSpeed.addEventListener("change", () => {
        storageSet(solarTimeSpeedKey, solarTimeSpeed.value);
      });

      solarTimeToggle.addEventListener("click", () => {
        solarTimeRunning = !solarTimeRunning;
        solarTimeLastTickMs = window.performance.now();
        storageSet(solarTimeRunningKey, String(solarTimeRunning));
        updateTimeReadout();
      });

      solarTimeReset.addEventListener("click", () => {
        solarTimeOffsetDays = 0;
        solarTimeOffset.value = "0";
        storageSet(solarTimeOffsetDaysKey, "0");
        updateTimeReadout();
      });

      solarTrailMonths.addEventListener("input", () => {
        solarTrailMonthsValue.textContent = `${solarTrailMonths.value} months`;
        storageSet(solarTrailMonthsKey, solarTrailMonths.value);
      });

      solarCameraReset.addEventListener("click", () => {
        storageSet(solarCameraResetKey, String(Date.now()));
      });

      solarFocus.addEventListener("change", () => {
        storageSet(solarFocusKey, solarFocus.value);
        const nextUrl = new URL(window.location.href);
        nextUrl.searchParams.set("view", "solar");
        nextUrl.searchParams.set("solar_focus", solarFocus.value);
        nextUrl.searchParams.delete("focus");
        window.history.replaceState(null, "", nextUrl.toString());
      });

      sourceForm.addEventListener("submit", (event) => {
        event.preventDefault();

        const token = tokenInput.value.trim();
        const source = sourceSelect.value;
        tokenInput.setCustomValidity("");
        if (token && !token.startsWith("pk.")) {
          tokenInput.setCustomValidity("Use a public Mapbox token that starts with pk.");
          tokenInput.reportValidity();
          return;
        }

        if (token) {
          storageSet(mapboxTokenKey, token);
        } else {
          storageRemove(mapboxTokenKey);
        }
        if (source === "auto") {
          storageRemove(earthTileSourceKey);
        } else {
          storageSet(earthTileSourceKey, source);
        }

        const nextUrl = new URL(window.location.href);
        nextUrl.searchParams.delete("mapbox_token");
        nextUrl.searchParams.delete("tile_source");
        nextUrl.searchParams.delete("earth_tiles");
        window.location.assign(nextUrl.toString());
      });
    </script>
    <link data-trunk rel="copy-dir" href="assets" />
    <link data-trunk rel="rust" data-bin="ferrisium_demo" data-wasm-opt="0" />
  </body>
</html>
